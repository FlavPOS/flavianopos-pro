name: myapp
description: "QuickPOS Pro - POS, Inventory & Sales Management System"
publish_to: 'none'
version: 1.0.31+78

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.5
  firebase_storage: ^12.4.5

  # State Management
  provider: ^6.1.2

  # UI & Design
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  google_fonts: ^8.1.0

  # Barcode & QR
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # PDF & Printing
  pdf: ^3.12.0
  printing: ^5.14.3

  # File & Data
  csv: ^6.0.0
  path_provider: ^2.1.5
  image_picker: ^1.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  connectivity_plus: ^6.1.4
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  image_cropper: ^12.2.1
  excel: ^4.0.6
  file_picker: ^8.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  sqflite_common_ffi_web: ^1.0.2
  crypto: ^3.0.7

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/images/
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true
