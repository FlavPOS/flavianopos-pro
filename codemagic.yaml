workflows:
  flavpos-android-release:
    name: FLAV POS Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      android_signing:
        - flavpos_keystore
      flutter: stable
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      - name: Build APK
        script: |
          flutter build apk --release
    
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    
    publishing:
      email:
        recipients:
          - flavpos@gmail.com
        notify:
          success: true
          failure: true
      
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: $FIREBASE_APP_ID
          groups:
            - myphone
          release_notes: |
            🚀 FLAV POS auto-build from Codemagic
