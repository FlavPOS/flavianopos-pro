workflows:
  flavpos-android-release:
    name: FLAV POS Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      groups:
        - firebase_credentials
        - keystore_credentials
      flutter: stable
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Set up keystore from environment
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/android/app/upload-keystore.jks
          cat > $CM_BUILD_DIR/android/key.properties <<PROPS
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=upload-keystore.jks
          PROPS
      
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      - name: Build APK
        script: |
          flutter build apk --release
    
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    
    publishing:
      email:
        recipients:
          - flavpos@gmail.com
        notify:
          success: true
          failure: true
      
      firebase:
        firebase_service_account: $FIREBASE_SERVICE_ACCOUNT
        android:
          app_id: $FIREBASE_APP_ID
          groups:
            - myphone
